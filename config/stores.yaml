# Configuración de tiendas a vigilar.
#
# Estado actual del desarrollo:
#   homedepot -> adaptador propio funcionando (HCL Commerce + Next.js).
#   liverpool -> en construcción (Algolia).
#   El resto está deshabilitado hasta tener su extractor real (la config VTEX
#   inicial resultó incorrecta para esas tiendas).
#
# Para errores de precio, agrega términos/categorías de OFERTAS o LIQUIDACIÓN.

threshold_pct: 50          # % mínimo de diferencia para reportar (incluye 50%)
max_discount_pct: 99       # % máximo: arriba de esto suele ser error de dato, se ignora

# Verificación cruzada: en vez de confiar en el "precio antes" del mismo
# vendedor (que suele estar inflado), se busca el MISMO modelo en otras tiendas
# y solo se reporta si está de verdad más barato que el mercado.
verify_cross_store: true
candidate_min_pct: 30      # descuento propio mínimo para molestarse en cruzar
verify_max_candidates: 250 # tope de candidatos a verificar por corrida (repo público: Actions gratis)
lookup_cache_ttl_hours: 48 # caché de precios de competencia (menos consultas Bright Data)
cross_confirm_pct: 20      # % por debajo de la rival más barata para confirmar (deals reales de mercado)

# Histórico de precios propio (nuestro "Keepa" gratis; data/price_history.json).
history_window_days: 90    # ventana móvil de precios por producto
history_min_points: 3      # mínimo de días distintos para confiar en el baseline
history_mature_series: 3000  # al superar N series, se considera "maduro" y se baja el gasto de red
net_fallback_mature: 15    # net_fallback cuando el histórico está maduro (ahorra Bright Data)
scan_workers: 6            # tiendas escaneadas en paralelo (cada una es red independiente)

# Árbitro extra: Google Shopping (agrega precios de muchos vendedores).
# Requiere secret BRIGHTDATA_SERP_ZONE (zona tipo "SERP API" en Bright Data).
# Costo acotado: solo top candidatos + tope por corrida + caché de 24h.
google_shopping:
  enabled: true
  min_pct: 30              # árbitro amplio: consulta Google para casi todos los candidatos con modelo
  max_lookups: 40          # tope de consultas de RED por corrida (caché no cuenta)
  max_lookups_mature: 15   # tope cuando el histórico propio ya está maduro (menos gasto)
  cache_ttl_hours: 48      # vigencia del precio cacheado por modelo

