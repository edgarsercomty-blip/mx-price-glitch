# Configuración de tiendas a vigilar.
#
# Estado actual del desarrollo:
#   homedepot -> adaptador propio funcionando (HCL Commerce + Next.js).
#   liverpool -> en construcción (Algolia).
#   El resto está deshabilitado hasta tener su extractor real (la config VTEX
#   inicial resultó incorrecta para esas tiendas).
#
# Para errores de precio, agrega términos/categorías de OFERTAS o LIQUIDACIÓN.

threshold_pct: 50          # % mínimo de diferencia para reportar (incluye 50%)
max_discount_pct: 99       # % máximo: arriba de esto suele ser error de dato, se ignora

# Verificación cruzada: en vez de confiar en el "precio antes" del mismo
# vendedor (que suele estar inflado), se busca el MISMO modelo en otras tiendas
# y solo se reporta si está de verdad más barato que el mercado.
verify_cross_store: true
candidate_min_pct: 30      # descuento propio mínimo para molestarse en cruzar
verify_max_candidates: 60  # tope de candidatos a verificar por corrida (los de mayor desc.)
cross_confirm_pct: 25      # % por debajo de la tienda rival más barata para confirmar

# Árbitro extra: Google Shopping (agrega precios de muchos vendedores).
# Requiere secret BRIGHTDATA_SERP_ZONE (zona tipo "SERP API" en Bright Data).
# Costo acotado: solo top candidatos + tope por corrida + caché de 24h.
google_shopping:
  enabled: true
  min_pct: 45              # solo consulta Google para candidatos con desc. propio >= esto
  max_lookups: 15          # tope de consultas de RED por corrida (caché no cuenta)
  cache_ttl_hours: 24      # vigencia del precio cacheado por modelo

stores:
  homedepot:
    name: The Home Depot MX
    type: homedepot
    enabled: true
    store_id: "10351"
    only_promo: true            # solo pide detalle de productos con icono de promo
    max_products_per_term: 50
    search_terms:               # diversificado por categorías (HD no tiene página de ofertas)
      - taladro
      - refrigerador
      - lavadora
      - pantalla
      - sala
      - bicicleta
      - generador
      - climas
      - cocina
      - microondas
      - calentador
      - mueble
      - iluminacion
      - jardin

  liverpool:
    name: Liverpool
    type: liverpool             # productos embebidos en __NEXT_DATA__
    enabled: true
    pages_per_term: 1
    search_terms:               # "ofertas/liquidacion" actúan como feed de deals
      - ofertas
      - liquidacion
      - pantalla
      - laptop
      - audifonos
      - celular
      - smartwatch
      - refrigerador
      - lavadora
      - licuadora
      - cafetera
      - tenis
      - perfume
      - reloj
      - bicicleta
      - juguete

  # --- deshabilitadas hasta tener extractor real ---
  coppel:
    name: Coppel
    type: jsonld
    enabled: false
    urls: []
  palacio:
    name: El Palacio de Hierro
    type: palacio              # API Constructor.io (directo, sin Bright Data)
    enabled: true
    num_results_per_page: 50
    search_terms:
      - bolsa
      - reloj
      - tenis
      - perfume
      - pantalla
      - audifonos
      - maleta
      - zapato
      - vestido
      - cartera
      - smartwatch
      - licuadora
  amazon:
    name: Amazon MX
    type: amazon               # vía Bright Data; solo reporta vendido/enviado por Amazon
    enabled: true
    scan_mode: deals           # recorre Ofertas de TODAS las categorías (no términos fijos)
    deals_pages: 5             # páginas del filtro de ofertas a recorrer (~48 c/u)
    max_products_per_term: 48
    search_terms:              # solo se usan si scan_mode: search
      - taladro
      - pantalla
      - laptop
      - audifonos
  walmart:
    name: Walmart MX
    type: walmart              # __NEXT_DATA__ vía Bright Data (bloquea directo)
    enabled: true
    max_products_per_term: 60
    search_terms:               # "ofertas/liquidacion" actúan como feed de deals
      - ofertas
      - liquidacion
      - pantalla
      - laptop
      - audifonos
      - celular
      - smartwatch
      - refrigerador
      - lavadora
      - licuadora
      - cafetera
      - tenis
      - perfume
      - reloj
      - bicicleta
      - juguete
  sams:
    name: Sam's Club MX
    type: sams                 # mismo platform que Walmart (vía Bright Data)
    enabled: true
    max_products_per_term: 60
    search_terms:
      - ofertas
      - pantalla
      - laptop
      - audifonos
      - refrigerador
      - lavadora
      - licuadora
      - cafetera
      - bicicleta
      - vino
  suburbia:
    name: Suburbia
    type: jsonld
    enabled: false
    urls: []
