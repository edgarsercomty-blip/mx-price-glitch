# Configuración de tiendas a vigilar.
#
# Estado actual del desarrollo:
#   homedepot -> adaptador propio funcionando (HCL Commerce + Next.js).
#   liverpool -> en construcción (Algolia).
#   El resto está deshabilitado hasta tener su extractor real (la config VTEX
#   inicial resultó incorrecta para esas tiendas).
#
# Para errores de precio, agrega términos/categorías de OFERTAS o LIQUIDACIÓN.

threshold_pct: 50          # % mínimo de diferencia para reportar (incluye 50%)
max_discount_pct: 99       # % máximo: arriba de esto suele ser error de dato, se ignora

# Verificación cruzada: en vez de confiar en el "precio antes" del mismo
# vendedor (que suele estar inflado), se busca el MISMO modelo en otras tiendas
# y solo se reporta si está de verdad más barato que el mercado.
verify_cross_store: true
candidate_min_pct: 30      # descuento propio mínimo para molestarse en cruzar
cross_confirm_pct: 25      # % por debajo de la tienda rival más barata para confirmar

# Árbitro extra: Google Shopping (agrega precios de muchos vendedores).
# Requiere secret BRIGHTDATA_SERP_ZONE (zona tipo "SERP API" en Bright Data).
# Costo acotado: solo top candidatos + tope por corrida + caché de 24h.
google_shopping:
  enabled: true
  min_pct: 45              # solo consulta Google para candidatos con desc. propio >= esto
  max_lookups: 15          # tope de consultas de RED por corrida (caché no cuenta)
  cache_ttl_hours: 24      # vigencia del precio cacheado por modelo

stores:
  homedepot:
    name: The Home Depot MX
    type: homedepot
    enabled: true
    store_id: "10351"
    only_promo: true            # solo pide detalle de productos con icono de promo
    max_products_per_term: 50
    search_terms:
      - taladro
      - refrigerador
      - lavadora
      - pantalla
      - sala
      - bicicleta
      - generador
      - climas

  liverpool:
    name: Liverpool
    type: liverpool             # productos embebidos en __NEXT_DATA__
    enabled: true
    pages_per_term: 1
    search_terms:
      - taladro
      - pantalla
      - laptop
      - refrigerador
      - lavadora
      - perfume
      - tenis
      - audifonos

  # --- deshabilitadas hasta tener extractor real ---
  coppel:
    name: Coppel
    type: jsonld
    enabled: false
    urls: []
  palacio:
    name: El Palacio de Hierro
    type: jsonld
    enabled: false
    urls: []
  amazon:
    name: Amazon MX
    type: jsonld
    enabled: false
    urls: []
  walmart:
    name: Walmart MX
    type: jsonld
    enabled: false
    urls: []
  sams:
    name: Sam's Club MX
    type: jsonld
    enabled: false
    urls: []
  suburbia:
    name: Suburbia
    type: jsonld
    enabled: false
    urls: []
