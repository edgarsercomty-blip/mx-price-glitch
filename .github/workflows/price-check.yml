name: Cazador de errores de precio MX

on:
  # Cron PAUSADO mientras afinamos los extractores. Para reactivarlo,
  # descomenta el bloque schedule (ej. cada 6 h: "0 */6 * * *").
  # schedule:
  #   - cron: "0 */6 * * *"
  workflow_dispatch: {}        # por ahora solo corre a mano (Run workflow)

permissions:
  contents: write              # para commitear data/
  issues: write                # para abrir el Issue con hallazgos

concurrency:
  group: price-check
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Escanear tiendas y detectar
        id: scan
        env:
          BRIGHTDATA_API_TOKEN: ${{ secrets.BRIGHTDATA_API_TOKEN }}
          BRIGHTDATA_ZONE: ${{ secrets.BRIGHTDATA_ZONE }}
        run: python -m src.main

      - name: Guardar resultados en el repo
        run: |
          git config user.name  "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Sin cambios en data/"
          else
            git commit -m "Resultados $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Abrir Issue si hubo hallazgos
        if: ${{ steps.scan.outputs.findings != '0' && steps.scan.outputs.findings != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "💸 ${{ steps.scan.outputs.findings }} posibles errores de precio — $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --body-file data/report.md
