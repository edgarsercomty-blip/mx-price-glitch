name: Cazador de errores de precio MX

on:
  schedule:
    - cron: "*/30 * * * *"     # cada 30 minutos (GitHub puede retrasar los cron)
  workflow_dispatch: {}        # también se puede correr a mano (Run workflow)

permissions:
  contents: write              # para commitear data/
  issues: write                # para abrir el Issue con hallazgos

concurrency:
  group: price-check
  cancel-in-progress: false

env:
  NOTIFY_USER: edgarsercomty-blip   # a quién se asigna/menciona (push en la app de GitHub)

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Escanear tiendas y detectar
        id: scan
        env:
          BRIGHTDATA_API_TOKEN: ${{ secrets.BRIGHTDATA_API_TOKEN }}
          BRIGHTDATA_ZONE: ${{ secrets.BRIGHTDATA_ZONE }}
        run: python -m src.main

      - name: Guardar resultados/estado en el repo
        run: |
          git config user.name  "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Sin cambios en data/"
          else
            git commit -m "Resultados $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      # Solo notifica si hay hallazgos NUEVOS (no vistos en corridas previas).
      # Se asigna y menciona al usuario -> la app de GitHub manda push al teléfono.
      - name: Notificar nuevos (Issue asignado)
        if: ${{ steps.scan.outputs.new != '0' && steps.scan.outputs.new != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '@%s nuevos posibles errores de precio 👇\n\n' "$NOTIFY_USER" > body.md
          cat data/new.md >> body.md
          gh issue create \
            --title "💸 ${{ steps.scan.outputs.new }} nuevos errores de precio — $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --body-file body.md \
            --assignee "$NOTIFY_USER"
