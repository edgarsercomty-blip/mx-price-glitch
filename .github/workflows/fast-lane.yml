name: Carril rápido (Liverpool + Palacio)

# Solo tiendas DIRECTAS (sin Bright Data) -> gratis, para cazar glitches casi en
# tiempo real. El escaneo completo de las 6 tiendas vive en price-check.yml (6h).
# Home Depot se quitó (0 hallazgos confirmados; sus SKUs propietarios no cruzan).
# La guardia igual valida cada confirmado contra Amazon/Walmart/Sam's.

on:
  schedule:
    - cron: "*/20 * * * *"     # cada 20 min (HD puede caer a Bright Data y tardar; evita encimar corridas)
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

# mismo grupo que el completo: nunca corren a la vez (evita choques al commitear)
concurrency:
  group: price-check
  cancel-in-progress: false

env:
  NOTIFY_USER: edgarsercomty-blip

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Escanear (Liverpool + Palacio)
        id: scan
        env:
          BRIGHTDATA_API_TOKEN: ${{ secrets.BRIGHTDATA_API_TOKEN }}
          BRIGHTDATA_ZONE: ${{ secrets.BRIGHTDATA_ZONE }}
          BRIGHTDATA_SERP_ZONE: ${{ secrets.BRIGHTDATA_SERP_ZONE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main --stores liverpool,palacio --net-fallback 0

      - name: Guardar resultados/estado en el repo
        run: |
          git config user.name  "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Sin cambios en data/"
          else
            git commit -m "Carril rápido $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase -X theirs -q origin main || true
            git push
          fi

      - name: Notificar nuevos (Issue asignado)
        if: ${{ steps.scan.outputs.new != '0' && steps.scan.outputs.new != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABELS: ${{ steps.scan.outputs.labels }}
        run: |
          printf '@%s ⚡ nuevos posibles errores (carril rápido) 👇\n\n' "$NOTIFY_USER" > body.md
          cat data/new.md >> body.md
          LABEL_ARG=""
          if [ -n "$LABELS" ]; then
            for lbl in $(echo "$LABELS" | tr ',' ' '); do
              gh label create "$lbl" --color "0075ca" --description "Categoría de producto" \
                --force 2>/dev/null || true
            done
            LABEL_ARG="--label $LABELS"
          fi
          gh issue create \
            --title "⚡💸 ${{ steps.scan.outputs.new }} nuevos errores de precio — $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --body-file body.md \
            --assignee "$NOTIFY_USER" \
            ${LABEL_ARG}
