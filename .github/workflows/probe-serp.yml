name: Probe (diagnóstico SERP / Walmart)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Qué probar"
        required: true
        default: "serp"
        type: choice
        options: [serp, walmart, amazon]
      query:
        description: "Texto a buscar"
        required: false
        default: "taladro"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Probe
        env:
          BRIGHTDATA_API_TOKEN: ${{ secrets.BRIGHTDATA_API_TOKEN }}
          BRIGHTDATA_ZONE: ${{ secrets.BRIGHTDATA_ZONE }}
          BRIGHTDATA_SERP_ZONE: ${{ secrets.BRIGHTDATA_SERP_ZONE }}
        run: python -m src.probe_${{ inputs.target }} "${{ inputs.query }}"
